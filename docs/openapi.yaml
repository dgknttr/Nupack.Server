openapi: 3.0.1
info:
  title: Nupack Server V3 API
  version: 0.1.0
  description: |
    Nupack Server is a lightweight NuGet V3 server reference implementation.

    Current goals:
    - protocol clarity
    - honest support surface
    - forkability
servers:
  - url: http://localhost:5003
    description: Local API host
paths:
  /v3/index.json:
    get:
      summary: Get the NuGet V3 service index
      responses:
        '200':
          description: Service index returned successfully
  /v3/search:
    get:
      summary: Search packages
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: take
          schema:
            type: integer
            default: 20
        - in: query
          name: prerelease
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Search results returned successfully
  /v3-flatcontainer/{id}/index.json:
    get:
      summary: Get all package versions for an ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version list returned successfully
        '404':
          description: Package ID not found
  /v3-flatcontainer/{id}/{version}/{fileName}:
    get:
      summary: Download a package file
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: version
          required: true
          schema:
            type: string
        - in: path
          name: fileName
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Package returned successfully
        '400':
          description: Path parameters did not match
        '404':
          description: Package version not found
  /v3-flatcontainer/{id}/{version}/{id2}.nuspec:
    get:
      summary: Download the extracted nuspec manifest
      responses:
        '200':
          description: Nuspec returned successfully
        '400':
          description: Path parameters did not match
        '404':
          description: Package version not found
  /v3/registrations/{id}/index.json:
    get:
      summary: Get registration metadata for all versions of a package
      responses:
        '200':
          description: Registration index returned successfully
        '404':
          description: Package ID not found
  /v3/registrations/{id}/page/{lower}/{upper}.json:
    get:
      summary: Get a registration page for a version range
      responses:
        '200':
          description: Registration page returned successfully
        '404':
          description: No versions in the requested range
  /v3/registrations/{id}/{version}.json:
    get:
      summary: Get registration metadata for a specific package version
      responses:
        '200':
          description: Registration leaf returned successfully
        '404':
          description: Package version not found
  /v3/push:
    put:
      summary: Upload a package file
      parameters:
        - in: header
          name: X-NuGet-ApiKey
          required: false
          schema:
            type: string
          description: Required outside Development unless PackageSecurity:AllowAnonymousWrites is enabled. Must match PackageSecurity:WriteApiKey when configured.
      responses:
        '201':
          description: Package uploaded successfully
        '400':
          description: Invalid package or duplicate version
        '401':
          description: Write API key missing or invalid
  /v3/delete/{id}/{version}:
    delete:
      summary: Delete a package version
      parameters:
        - in: header
          name: X-NuGet-ApiKey
          required: false
          schema:
            type: string
          description: Required outside Development unless PackageSecurity:AllowAnonymousWrites is enabled. Must match PackageSecurity:WriteApiKey when configured.
      responses:
        '204':
          description: Package deleted successfully
        '401':
          description: Write API key missing or invalid
        '404':
          description: Package version not found
  /health:
    get:
      summary: Get a simple health payload
      responses:
        '200':
          description: Server is healthy
